name: Deploy Citizen Web

on:
  push:
    branches: [main]
    paths:
      - "apps/admin-gabon-citizen/**"
      - "packages/**"
      - ".github/workflows/deploy-citizen.yml"
  workflow_dispatch:

env:
  PROJECT_ID: administration-ga
  REGION: europe-west1
  SERVICE_NAME: admin-gabon-citizen
  REGISTRY: europe-west1-docker.pkg.dev/administration-ga/docker-registry

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy secrets availability
        id: secrets
        # On accepte deux méthodes d'auth GCP : clé service-account JSON
        # (credentials_json — préféré, plus simple) ou WIF
        # (workload_identity_provider). Au moins l'une des deux doit être
        # présente, ainsi que NEXT_PUBLIC_CONVEX_URL pour le build.
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_CONVEX_URL }}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "auth_method=none" >> "$GITHUB_OUTPUT"
            echo "::warning::NEXT_PUBLIC_CONVEX_URL manquant — déploiement skippé."
            exit 0
          fi
          if [ -n "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "auth_method=sa_key" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ secrets.WIF_PROVIDER }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "auth_method=wif" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "auth_method=none" >> "$GITHUB_OUTPUT"
            echo "::warning::Aucun secret GCP (GCP_SA_KEY ou WIF_PROVIDER) — déploiement skippé."
          fi

      - name: Authenticate to Google Cloud (service account key)
        if: steps.secrets.outputs.auth_method == 'sa_key'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        if: steps.secrets.outputs.auth_method == 'wif'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-actions@administration-ga.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        if: steps.secrets.outputs.available == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: steps.secrets.outputs.available == 'true'
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        if: steps.secrets.outputs.available == 'true'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build \
            --no-cache \
            --platform linux/amd64 \
            -f apps/admin-gabon-citizen/Dockerfile \
            --build-arg NEXT_PUBLIC_CONVEX_URL=${{ secrets.NEXT_PUBLIC_CONVEX_URL }} \
            --build-arg CONVEX_SITE_URL=${{ secrets.CONVEX_SITE_URL }} \
            --build-arg NEXT_PUBLIC_SITE_URL=https://demarche.ga \
            --build-arg NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }} \
            --build-arg NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }} \
            --build-arg NEXT_PUBLIC_LIVEKIT_WS_URL=${{ secrets.NEXT_PUBLIC_LIVEKIT_WS_URL }} \
            --build-arg NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }} \
            --build-arg POSTHOG_PERSONAL_API_KEY=${{ secrets.POSTHOG_PERSONAL_API_KEY }} \
            --build-arg POSTHOG_ENV_ID=${{ secrets.POSTHOG_ENV_ID }} \
            --build-arg GITHUB_SHA=${{ github.sha }} \
            -t "$IMAGE" \
            -t "${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:latest" \
            .
          docker push "$IMAGE"
          docker push "${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:latest"

      - name: Deploy to Cloud Run
        if: steps.secrets.outputs.available == 'true'
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}" \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars="NODE_ENV=production,CONVEX_SITE_URL=${{ secrets.CONVEX_SITE_URL }},NEXT_PUBLIC_APP_NAME=ADMINISTRATION.GA,NEXT_PUBLIC_DOMAIN_CITIZEN=demarche.ga,NEXT_PUBLIC_DOMAIN_AGENT=administration.ga,NEXT_PUBLIC_DOMAIN_ADMIN=admin.administration.ga"

          # Force 100% traffic to the latest deployment (prevents manual pinning issues)
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --to-latest \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}
