name: Deploy Citizen Web

on:
  push:
    branches: [main]
    paths:
      - "apps/citizen-web/**"
      - "packages/**"
      - ".github/workflows/deploy-citizen.yml"
  workflow_dispatch:

env:
  PROJECT_ID: administration-ga
  REGION: europe-west1
  SERVICE_NAME: citizen-web
  REGISTRY: europe-west1-docker.pkg.dev/administration-ga/docker-registry

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-actions@administration-ga.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build \
            --no-cache \
            --platform linux/amd64 \
            -f apps/citizen-web/Dockerfile \
            --build-arg NEXT_PUBLIC_CONVEX_URL=${{ secrets.NEXT_PUBLIC_CONVEX_URL }} \
            --build-arg CONVEX_SITE_URL=${{ secrets.CONVEX_SITE_URL }} \
            --build-arg NEXT_PUBLIC_SITE_URL=https://demarche.ga \
            --build-arg NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }} \
            --build-arg NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }} \
            --build-arg NEXT_PUBLIC_LIVEKIT_WS_URL=${{ secrets.NEXT_PUBLIC_LIVEKIT_WS_URL }} \
            --build-arg NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }} \
            --build-arg POSTHOG_PERSONAL_API_KEY=${{ secrets.POSTHOG_PERSONAL_API_KEY }} \
            --build-arg POSTHOG_ENV_ID=${{ secrets.POSTHOG_ENV_ID }} \
            --build-arg GITHUB_SHA=${{ github.sha }} \
            -t "$IMAGE" \
            -t "${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:latest" \
            .
          docker push "$IMAGE"
          docker push "${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}" \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars="NODE_ENV=production,CONVEX_SITE_URL=${{ secrets.CONVEX_SITE_URL }},NEXT_PUBLIC_APP_NAME=ADMINISTRATION.GA,NEXT_PUBLIC_DOMAIN_CITIZEN=demarche.ga,NEXT_PUBLIC_DOMAIN_AGENT=administration.ga,NEXT_PUBLIC_DOMAIN_ADMIN=admin.administration.ga"

          # Force 100% traffic to the latest deployment (prevents manual pinning issues)
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --to-latest \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}
