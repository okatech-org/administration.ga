name: Test Citizen Web (E2E)

on:
  pull_request:
    paths:
      - "apps/admin-gabon-citizen/**"
      - "packages/**"
      - "convex/**"
      - ".github/workflows/test-citizen-e2e.yml"
  push:
    branches: [main]
    paths:
      - "apps/admin-gabon-citizen/**"
      - "packages/**"
      - "convex/**"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.17"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        working-directory: apps/admin-gabon-citizen
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.E2E_CONVEX_URL }}
          CONVEX_SITE_URL: ${{ secrets.E2E_CONVEX_SITE_URL }}
          NEXT_PUBLIC_E2E_MODE: "true"
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/admin-gabon-citizen/playwright-report/
          retention-days: 7
