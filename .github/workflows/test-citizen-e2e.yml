name: Test Citizen Web (E2E)

on:
  pull_request:
    paths:
      - "apps/demarche_ga/**"
      - "packages/**"
      - "convex/**"
      - ".github/workflows/test-citizen-e2e.yml"
  push:
    branches: [main]
    paths:
      - "apps/demarche_ga/**"
      - "packages/**"
      - "convex/**"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check E2E secrets availability
        id: secrets
        run: |
          if [ -n "${{ secrets.E2E_CONVEX_URL }}" ] && [ -n "${{ secrets.E2E_CONVEX_SITE_URL }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::E2E secrets (E2E_CONVEX_URL/E2E_CONVEX_SITE_URL) non configurés — E2E skippé."
          fi

      - name: Setup Bun
        if: steps.secrets.outputs.available == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.17"

      - name: Install dependencies
        if: steps.secrets.outputs.available == 'true'
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        if: steps.secrets.outputs.available == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        if: steps.secrets.outputs.available == 'true'
        run: npx playwright test
        working-directory: apps/demarche_ga
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.E2E_CONVEX_URL }}
          CONVEX_SITE_URL: ${{ secrets.E2E_CONVEX_SITE_URL }}
          NEXT_PUBLIC_E2E_MODE: "true"
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/demarche_ga/playwright-report/
          retention-days: 7
