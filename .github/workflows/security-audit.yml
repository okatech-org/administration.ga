name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Audit trimestriel automatique — 1er de chaque trimestre a 6h UTC
    - cron: "0 6 1 1,4,7,10 *"

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.17"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run bun audit
        run: |
          echo "## Dependency Audit Results" >> $GITHUB_STEP_SUMMARY
          bun audit 2>&1 | tee audit-results.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat audit-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check for critical vulnerabilities
        run: |
          if bun audit 2>&1 | grep -qi "critical"; then
            echo "::error::Critical vulnerabilities found in dependencies"
            exit 1
          fi

  secret-scanning:
    name: Secret Leak Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz
          chmod +x gitleaks

      - name: Run gitleaks
        run: |
          ./gitleaks detect --source . --verbose --report-format json --report-path gitleaks-report.json || true
          if [ -s gitleaks-report.json ] && [ "$(cat gitleaks-report.json)" != "[]" ]; then
            echo "::error::Secrets detected in repository history!"
            cat gitleaks-report.json
            exit 1
          fi
          echo "No secrets detected."

  typecheck:
    name: Convex Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.17"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Convex typecheck
        run: npx convex typecheck

  security-headers-check:
    name: Verify Security Headers Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check CSP headers exist in all apps
        run: |
          for app in citizen-web-legacy agent-web backoffice-web; do
            FILE="apps/${app}/server/middleware/security-headers.ts"
            if [ ! -f "$FILE" ]; then
              echo "::error::Security headers missing for ${app}"
              exit 1
            fi
            if ! grep -q "Content-Security-Policy" "$FILE"; then
              echo "::error::CSP header missing in ${app}"
              exit 1
            fi
            if ! grep -q "Strict-Transport-Security" "$FILE"; then
              echo "::error::HSTS header missing in ${app}"
              exit 1
            fi
            echo "Security headers OK for ${app}"
          done

      - name: Check no public queries in NEOCORTEX
        run: |
          VULN_FILES="convex/limbique.ts convex/monitoring.ts convex/hippocampe.ts convex/plasticite.ts convex/auditif.ts convex/visuel.ts convex/prefrontal.ts"
          for file in $VULN_FILES; do
            if [ -f "$file" ] && grep -q "= query({" "$file"; then
              echo "::error::Public query detected in ${file} — must use backofficeQuery/authQuery"
              exit 1
            fi
          done
          echo "No public NEOCORTEX queries found."

      - name: Check check_id.ts does not exist
        run: |
          if [ -f "convex/check_id.ts" ]; then
            echo "::error::check_id.ts must not exist (DB enumeration vulnerability)"
            exit 1
          fi
          echo "check_id.ts correctly removed."
