appId: ga.consulat.agent
productName: "Consulat Agent"
copyright: "Copyright © 2025 Okatech"

# Pin electron version (hoisted to root node_modules in monorepo)
electronVersion: "35.7.5"

directories:
  output: dist
  buildResources: resources

# Only include built output + runtime deps (workspace packages are bundled by Vite)
files:
  - "out/**/*"
  - "package.json"
  - "!src/**"
  - "!electron.vite.config.*"
  - "!tsconfig*"
  - "!.env*"
  - "!SPECS.md"

asar: true
asarUnpack:
  # Native FFI module must be unpacked for koffi to load .dll/.dylib
  - "node_modules/koffi/**"

# ── macOS ─────────────────────────────────────────────
mac:
  category: public.app-category.business
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"
  target:
    - target: dmg
    - target: zip # Required for auto-update (electron-updater)
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.inherit.plist
  # ── Signing & Notarization ────────────────────────────
  # Requires env vars at build time:
  #   CSC_LINK                   → path or base64 of the .p12 exported from Keychain
  #   CSC_KEY_PASSWORD           → password of the .p12
  #   APPLE_ID                   → Apple Developer account email
  #   APPLE_APP_SPECIFIC_PASSWORD → app-specific password from appleid.apple.com
  #   APPLE_TEAM_ID              → 10-char team ID from developer.apple.com/membership
  notarize: true

dmg:
  sign: false

# ── Windows ───────────────────────────────────────────
win:
  artifactName: "${productName}-${version}-win-${arch}-Setup.${ext}"
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

# ── Auto-update via GitHub Releases ───────────────────
publish:
  provider: github
  owner: okatech-org
  repo: gabon-diplomatie
  releaseType: release
