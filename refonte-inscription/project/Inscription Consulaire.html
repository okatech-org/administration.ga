<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inscription Consulaire — Refonte</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    /* Core tokens */
    --bg: #f7f6f2;
    --bg-deep: #efece4;
    --surface: #ffffff;
    --surface-2: #fbfaf6;
    --border: #e6e2d8;
    --border-strong: #d2cdbf;
    --text: #14130f;
    --text-muted: #6a665b;
    --text-faint: #9a9588;

    /* Brand — Gabon */
    --gabon-blue: #0b4f9c;
    --gabon-blue-deep: #073871;
    --gabon-blue-tint: #e7eff9;
    --gabon-green: #0a8a3b;
    --gabon-green-tint: #e3f3e9;
    --gabon-yellow: #f1c531;
    --gabon-yellow-tint: #fbf2cf;

    /* Status */
    --success: #157a3d;
    --success-tint: #e3f1e8;
    --warning: #a16e00;
    --warning-tint: #faedca;
    --danger: #b3261e;
    --danger-tint: #fbe9e7;

    /* Layout */
    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --shadow-sm: 0 1px 0 rgba(20, 19, 15, 0.04), 0 1px 2px rgba(20, 19, 15, 0.04);
    --shadow: 0 1px 0 rgba(20, 19, 15, 0.04), 0 6px 20px -10px rgba(20, 19, 15, 0.12);
    --shadow-lg: 0 18px 50px -22px rgba(20, 19, 15, 0.28);

    --font: "IBM Plex Sans", system-ui, -apple-system, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg-deep);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01", "cv01";
    overflow-x: hidden;
  }

  body { min-height: 100vh; }

  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }
  a { color: inherit; }

  /* App stage: holds the "device" frame (mobile or desktop) */
  .app-stage {
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 24px 80px;
    background:
      radial-gradient(1200px 600px at 10% 0%, rgba(11, 79, 156, 0.06), transparent 60%),
      radial-gradient(900px 500px at 90% 10%, rgba(10, 138, 59, 0.045), transparent 70%),
      var(--bg-deep);
  }

  /* Desktop chrome */
  .desktop-shell {
    width: 100%;
    max-width: 1280px;
    background: var(--bg);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    border: 1px solid var(--border);
  }

  /* Mobile chrome */
  .mobile-shell {
    width: 100%;
    max-width: 412px;
    height: min(900px, calc(100vh - 64px));
    background: var(--bg);
    border-radius: 36px;
    box-shadow: var(--shadow-lg), 0 0 0 8px #1a1814, 0 0 0 9px #2a2620;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    border: 1px solid #0a0907;
  }

  /* Mobile status bar (faux iOS-ish, generic) */
  .status-bar {
    height: 38px;
    flex: 0 0 38px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 22px 0 28px;
    background: var(--bg);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .status-bar-right { display: flex; align-items: center; gap: 6px; }
  .status-bar-icon { width: 16px; height: 11px; }

  /* Mobile home indicator */
  .home-indicator {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: #14130f;
    border-radius: 100px;
    opacity: 0.85;
    z-index: 50;
    pointer-events: none;
  }

  .mobile-body {
    flex: 1;
    overflow: auto;
    position: relative;
    background: var(--bg);
  }

  /* Typography */
  h1, h2, h3, h4 { margin: 0; font-weight: 600; letter-spacing: -0.01em; }
  h1 { font-size: 28px; line-height: 1.15; letter-spacing: -0.02em; }
  h2 { font-size: 22px; line-height: 1.2; letter-spacing: -0.015em; }
  h3 { font-size: 17px; line-height: 1.3; }
  p { margin: 0; }

  .text-mono { font-family: var(--mono); }
  .text-muted { color: var(--text-muted); }
  .text-faint { color: var(--text-faint); }
  .text-xs { font-size: 12px; }
  .text-sm { font-size: 13px; }
  .text-md { font-size: 15px; }

  /* Form controls */
  .field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .field-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .field-label .req {
    color: var(--danger);
    font-weight: 500;
  }
  .field-hint { font-size: 12px; color: var(--text-muted); }
  .field-error { font-size: 12px; color: var(--danger); display: flex; align-items: center; gap: 4px; }

  .input,
  .select,
  .textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 15px;
    color: var(--text);
    transition: border-color 120ms, box-shadow 120ms, background 120ms;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
  }
  .input::placeholder, .textarea::placeholder { color: var(--text-faint); }
  .input:hover, .select:hover { border-color: #b9b3a2; }
  .input:focus, .select:focus, .textarea:focus {
    border-color: var(--gabon-blue);
    box-shadow: 0 0 0 4px rgba(11, 79, 156, 0.12);
  }

  .density-compact .input,
  .density-compact .select { padding: 9px 12px; font-size: 14px; }
  .density-compact .field { gap: 4px; }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: "";
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-25%) rotate(45deg);
    width: 7px;
    height: 7px;
    border-right: 1.5px solid var(--text-muted);
    border-bottom: 1.5px solid var(--text-muted);
    pointer-events: none;
  }
  .select { padding-right: 38px; cursor: pointer; }

  /* Buttons */
  .btn {
    appearance: none;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text);
    padding: 12px 18px;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.005em;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 120ms, border-color 120ms, color 120ms, transform 80ms;
    text-decoration: none;
    line-height: 1;
    min-height: 44px;
  }
  .btn:active { transform: scale(0.985); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-primary {
    background: var(--gabon-blue);
    color: #fff;
    border-color: var(--gabon-blue);
  }
  .btn-primary:hover { background: var(--gabon-blue-deep); border-color: var(--gabon-blue-deep); }

  .btn-ghost {
    background: transparent;
    color: var(--text);
    border-color: var(--border-strong);
  }
  .btn-ghost:hover { background: var(--surface-2); }

  .btn-soft {
    background: var(--surface);
    border-color: var(--border-strong);
    color: var(--text);
  }
  .btn-soft:hover { background: var(--surface-2); }

  .btn-text {
    background: transparent;
    border-color: transparent;
    color: var(--gabon-blue);
    padding: 6px 10px;
    min-height: 36px;
  }
  .btn-text:hover { background: var(--gabon-blue-tint); }

  .btn-sm { padding: 8px 12px; font-size: 13px; min-height: 36px; }
  .btn-lg { padding: 14px 22px; font-size: 16px; min-height: 52px; }
  .btn-block { width: 100%; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
  }
  .card-pad { padding: 24px; }
  .density-compact .card-pad { padding: 18px; }

  /* Gabon stripe */
  .gabon-stripe {
    display: flex;
    height: 3px;
    width: 36px;
    border-radius: 100px;
    overflow: hidden;
  }
  .gabon-stripe > span { flex: 1; }
  .gabon-stripe .g1 { background: var(--gabon-green); }
  .gabon-stripe .g2 { background: var(--gabon-yellow); }
  .gabon-stripe .g3 { background: var(--gabon-blue); }

  /* Pills + badges */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .pill-success { color: var(--success); border-color: var(--success-tint); background: var(--success-tint); }
  .pill-info { color: var(--gabon-blue); border-color: var(--gabon-blue-tint); background: var(--gabon-blue-tint); }
  .pill-warning { color: var(--warning); border-color: var(--warning-tint); background: var(--warning-tint); }

  /* Stepper */
  .stepper {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stepper-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stepper-dot {
    width: 26px;
    height: 26px;
    border-radius: 100px;
    background: var(--surface);
    border: 1.5px solid var(--border-strong);
    color: var(--text-muted);
    display: grid;
    place-items: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .stepper-item.done .stepper-dot {
    background: var(--gabon-blue);
    border-color: var(--gabon-blue);
    color: #fff;
  }
  .stepper-item.current .stepper-dot {
    background: var(--surface);
    border-color: var(--gabon-blue);
    color: var(--gabon-blue);
    box-shadow: 0 0 0 4px rgba(11, 79, 156, 0.1);
  }
  .stepper-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
  }
  .stepper-item.current .stepper-label,
  .stepper-item.done .stepper-label { color: var(--text); }
  .stepper-bar {
    flex: 1;
    height: 1.5px;
    background: var(--border);
    border-radius: 1px;
    margin: 0 4px;
  }
  .stepper-bar.done { background: var(--gabon-blue); }

  /* Progress bar (mobile) */
  .progress {
    height: 4px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
    width: 100%;
  }
  .progress-fill {
    height: 100%;
    background: var(--gabon-blue);
    border-radius: 100px;
    transition: width 300ms cubic-bezier(0.2, 0.7, 0.2, 1);
  }

  /* Tweaks panel from starter */
  /* (styled inside the panel itself) */

  /* Decorative top stripe for cards / hero */
  .stripe-top::before {
    content: "";
    display: block;
    height: 3px;
    background: linear-gradient(to right,
      var(--gabon-green) 0%, var(--gabon-green) 33%,
      var(--gabon-yellow) 33%, var(--gabon-yellow) 66%,
      var(--gabon-blue) 66%, var(--gabon-blue) 100%);
  }

  /* OTP / PIN input */
  .otp-grid {
    display: grid;
    gap: 8px;
  }
  .otp-grid.len-6 { grid-template-columns: repeat(6, 44px); max-width: 304px; }
  .otp-grid.len-4 { grid-template-columns: repeat(4, 52px); max-width: 244px; }
  .otp-cell {
    width: 100%;
    height: 52px;
    background: var(--surface);
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius);
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    font-family: var(--mono);
    color: var(--text);
    transition: border-color 120ms, box-shadow 120ms;
    padding: 0;
  }
  .otp-grid.len-4 .otp-cell { height: 60px; font-size: 24px; }
  .otp-cell[readonly] { cursor: default; caret-color: transparent; }

  /* On-screen numpad (mobile PIN entry) */
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 304px;
    width: 100%;
    margin: 8px auto 0;
  }
  .numpad-key {
    height: 56px;
    border-radius: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 22px;
    font-weight: 500;
    font-family: var(--mono);
    color: var(--text);
    display: grid;
    place-items: center;
    transition: background 100ms, transform 80ms, border-color 100ms;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    cursor: pointer;
    padding: 0;
    box-shadow: 0 1px 0 rgba(20,19,15,0.04);
  }
  .numpad-key:hover { border-color: var(--border-strong); }
  .numpad-key:active { transform: scale(0.94); background: var(--bg-deep); }
  .numpad-key.action {
    background: transparent;
    border-color: transparent;
    color: var(--text-muted);
    box-shadow: none;
  }
  .numpad-key.action:hover { background: var(--surface-2); }
  .numpad-key.placeholder {
    background: transparent;
    border-color: transparent;
    box-shadow: none;
    cursor: default;
    pointer-events: none;
  }
  .otp-cell:focus {
    outline: none;
    border-color: var(--gabon-blue);
    box-shadow: 0 0 0 4px rgba(11, 79, 156, 0.12);
  }
  .otp-cell.filled { border-color: var(--gabon-blue); }

  /* Drawer/sheet (mobile) */
  .scrim {
    position: absolute;
    inset: 0;
    background: rgba(20, 19, 15, 0.5);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 40;
    animation: fade-in 200ms ease;
  }
  .sheet {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--bg);
    border-top-left-radius: 24px;
    border-top-right-radius: 24px;
    z-index: 41;
    box-shadow: 0 -20px 50px -20px rgba(20, 19, 15, 0.3);
    animation: slide-up 320ms cubic-bezier(0.2, 0.8, 0.2, 1);
    max-height: 92%;
    display: flex;
    flex-direction: column;
  }
  .sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--border-strong);
    border-radius: 100px;
    margin: 10px auto 0;
    flex-shrink: 0;
  }

  /* Modal (desktop) */
  .modal-scrim {
    position: fixed;
    inset: 0;
    background: rgba(20, 19, 15, 0.5);
    z-index: 100;
    animation: fade-in 200ms ease;
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .modal {
    background: var(--bg);
    border-radius: 20px;
    width: 100%;
    max-width: 560px;
    max-height: 85vh;
    overflow: auto;
    box-shadow: 0 30px 80px -20px rgba(20, 19, 15, 0.35);
    animation: pop-in 220ms cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes pop-in { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

  /* Typeform-style slide transitions */
  .tf-slide {
    animation: tf-enter 320ms cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  @keyframes tf-enter {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Document upload card */
  .upload-zone {
    border: 1.5px dashed var(--border-strong);
    background: var(--surface-2);
    border-radius: var(--radius-lg);
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-align: center;
    cursor: pointer;
    transition: background 120ms, border-color 120ms;
    min-height: 140px;
    justify-content: center;
  }
  .upload-zone:hover { border-color: var(--gabon-blue); background: var(--gabon-blue-tint); }
  .upload-zone.filled {
    background: var(--success-tint);
    border-color: var(--success);
    border-style: solid;
  }

  /* Sticky action bar (mobile) */
  .action-bar {
    position: sticky;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to bottom, rgba(247, 246, 242, 0) 0%, var(--bg) 30%);
    padding: 24px 20px 28px;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  /* Util */
  .row { display: flex; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .gap-4 { gap: 16px; }
  .gap-6 { gap: 24px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; }
  .mt-6 { margin-top: 24px; } .mt-8 { margin-top: 32px; }
  .mb-2 { margin-bottom: 8px; }
  .flex-1 { flex: 1; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .ta-center { text-align: center; }

  /* AI invite variants */
  .ai-banner {
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(120deg, rgba(11,79,156,0.06), rgba(10,138,59,0.04));
    border: 1px solid var(--gabon-blue-tint);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
  }
  .ai-hero {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .ai-hero::before {
    content: "";
    position: absolute;
    inset: -50% -20% auto auto;
    width: 240px;
    height: 240px;
    background: radial-gradient(circle, rgba(11,79,156,0.12), transparent 70%);
    pointer-events: none;
  }
  .ai-sticky {
    position: sticky;
    top: 12px;
    z-index: 5;
  }

  /* Toggle (segmented) */
  .seg {
    display: inline-flex;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 3px;
    gap: 2px;
  }
  .seg button {
    border: none;
    background: transparent;
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
  }
  .seg button.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }

  /* Header (desktop) */
  .site-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .site-header-nav {
    display: flex;
    align-items: center;
    gap: 24px;
    font-size: 14px;
    font-weight: 500;
  }
  .site-header-nav a { text-decoration: none; color: var(--text-muted); }
  .site-header-nav a:hover { color: var(--text); }

  /* Mobile mini-header (chrome minimal) */
  .mobile-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 100px;
    background: transparent;
    border: none;
    display: grid;
    place-items: center;
    color: var(--text);
    cursor: pointer;
  }
  .icon-btn:hover { background: var(--surface-2); }

  /* Logo mark */
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .logo-mark {
    width: 32px;
    height: 32px;
    border-radius: 9px;
    background: var(--gabon-blue);
    color: #fff;
    display: grid;
    place-items: center;
    font-weight: 700;
    font-size: 15px;
    position: relative;
    overflow: hidden;
  }
  .logo-mark::after {
